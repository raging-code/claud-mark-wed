<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP Admin</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f3f4f6; }
        .container { max-width: 1300px; margin: 20px auto; background: white; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #7c3aed; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { margin: 0; font-size: 1.6rem; }
        .logout-btn { background: #4c1d95; border: none; color: white; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .logout-btn:hover { background: #3b0764; }
        .add-section { background: #f5f3ff; padding: 20px 30px; border-bottom: 1px solid #e9d5ff; }
        .add-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .add-form input, .add-form select { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; }
        .add-form button { background: #10b981; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .add-form button:hover { background: #059669; }
        .table-wrapper { overflow-x: auto; padding: 0 20px 20px 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid #e5e7eb; padding: 12px; text-align: left; vertical-align: top; }
        th { background: #f9fafb; font-weight: 600; color: #1f2937; }
        tr:hover { background: #faf5ff; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .delete-btn:hover { background: #dc2626; }
        .login-card { max-width: 400px; margin: 80px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d1d5db; border-radius: 10px; }
        .login-card button { width: 100%; background: #7c3aed; color: white; padding: 12px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .status { margin-top: 15px; font-size: 0.85rem; padding: 8px; border-radius: 8px; }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
    </style>
    <!-- Supabase JS with SRI – generate at srihash.org -->
    <<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js" integrity="sha384-wgi7s9Y2xefdDru3II6Xb11y/YNoKVbuydTikWejwId9z2xRd8SveCTrJjj/QAnH" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script>
    const SUPABASE_URL = 'https://uziyzioqazqznjsvhxky.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6aXl6aW9xYXpxem5qc3ZoeGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzYyNzgsImV4cCI6MjA5MjM1MjI3OH0.w57BWU-mUK8qBrqJODNv3OZdvZa57_Ql4iz-P3KbUZQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            renderAdminPanel(session);
        } else {
            renderLogin();
        }
    }

    function renderLogin() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="login-card">
                <h2>🔐 Admin Login</h2>
                <input type="email" id="email" placeholder="Email" autocomplete="email">
                <input type="password" id="password" placeholder="Password">
                <button id="loginBtn">Sign In</button>
                <div id="loginStatus" class="status"></div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('loginStatus');
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                statusDiv.textContent = '❌ ' + error.message;
                statusDiv.className = 'status error';
            } else {
                checkSession();
            }
        };
    }

    async function renderAdminPanel(session) {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="container">
                <div class="header">
                    <h1>💍 Wedding RSVP Manager</h1>
                    <button class="logout-btn" id="logoutBtn">Logout (${escapeHtml(session.user.email)})</button>
                </div>
                <div class="add-section">
                    <h3 style="margin:0 0 12px 0;">➕ Add New RSVP (manual)</h3>
                    <div class="add-form">
                        <input type="text" id="addName" placeholder="Full name *" style="flex:2">
                        <input type="email" id="addEmail" placeholder="Email *" style="flex:2">
                        <input type="tel" id="addPhone" placeholder="Phone" style="flex:1">
                        <input type="text" id="addMessage" placeholder="Message" style="flex:2">
                        <select id="addAttending" style="flex:1">
                            <option value="yes">✅ Yes, attending</option>
                            <option value="no">❌ No, not attending</option>
                        </select>
                        <button id="addRsvpBtn">+ Add</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Message</th><th>Attending</th><th>Submitted</th><th>Action</th></tr>
                        </thead>
                        <tbody id="rsvpTableBody">
                            <tr><td colspan="8" class="loading">Loading RSVPs...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="adminStatus" class="status" style="margin: 0 20px 20px 20px;"></div>
            </div>
        `;

        await loadRsvps();

        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            checkSession();
        };

        document.getElementById('addRsvpBtn').onclick = async () => {
            const name = document.getElementById('addName').value.trim();
            const email = document.getElementById('addEmail').value.trim();
            const phone = document.getElementById('addPhone').value.trim();
            const message = document.getElementById('addMessage').value.trim();
            const attending = document.getElementById('addAttending').value;

            if (!name || !email) {
                showStatus('adminStatus', 'Name and email are required', 'error');
                return;
            }

            const { error } = await supabase
                .from('rsvp')
                .insert([{ name, email, phone, message, attending }]);

            if (error) {
                showStatus('adminStatus', 'Error: ' + error.message, 'error');
            } else {
                showStatus('adminStatus', '✅ RSVP added successfully', 'success');
                document.getElementById('addName').value = '';
                document.getElementById('addEmail').value = '';
                document.getElementById('addPhone').value = '';
                document.getElementById('addMessage').value = '';
                document.getElementById('addAttending').value = 'yes';
                await loadRsvps();
            }
        };
    }

    async function loadRsvps() {
        const tbody = document.getElementById('rsvpTableBody');
        if (!tbody) return;
        
        const { data, error } = await supabase
            .from('rsvp')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="8">❌ Failed to load: ${escapeHtml(error.message)}</td></tr>`;
            return;
        }

        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8">📭 No RSVPs yet.</td></tr>`;
            return;
        }

        tbody.innerHTML = '';
        for (const row of data) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row.id}</td>
                <td>${escapeHtml(row.name)}</td>
                <td>${escapeHtml(row.email)}</td>
                <td>${escapeHtml(row.phone || '—')}</td>
                <td>${escapeHtml(row.message || '—')}</td>
                <td>${row.attending === 'yes' ? '✅ Yes' : '❌ No'}</td>
                <td>${new Date(row.created_at).toLocaleString()}</td>
                <td><button class="delete-btn" data-id="${row.id}">Delete</button></td>
            `;
            tbody.appendChild(tr);
        }

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = parseInt(btn.dataset.id);
                if (confirm('⚠️ Permanently delete this RSVP?')) {
                    const { error } = await supabase.from('rsvp').delete().eq('id', id);
                    if (error) {
                        showStatus('adminStatus', 'Delete failed: ' + error.message, 'error');
                    } else {
                        showStatus('adminStatus', '🗑️ Deleted successfully', 'success');
                        await loadRsvps();
                    }
                }
            };
        });
    }

    function showStatus(elementId, message, type) {
        const el = document.getElementById(elementId);
        if (el) {
            el.textContent = message;
            el.className = `status ${type}`;
            setTimeout(() => { if (el) el.textContent = ''; }, 3000);
        }
    }

    checkSession();
</script>
</body>
</html>
