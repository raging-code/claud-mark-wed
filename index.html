<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sakura Wedding | Forever Begins</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-image-wrapper">
            <img src="assets/images/hero-couple.jpg" alt="Bride and Groom" class="hero-img">
            <div class="sakura-overlay"></div>
        </div>
    </section>

    <!-- Logo + Main Message -->
    <div class="sakura-fullwidth-wrapper">
        <div class="container text-center d-flex flex-column align-items-center justify-content-center">
            <div class="wedding-logo mb-0">
                <img src="assets/images/logo.png" alt="Wedding Logo" class="img-fluid" style="max-height: 300px; margin-bottom: -10px;">
            </div>
            <h1 class="main-title mt-0">WE'RE GETTING MARRIED</h1>
        </div>
    </div>

    <!-- Audio Player -->
    <div class="container mt-4 mb-5">
        <div class="audio-card shadow-sm rounded-4 bg-white mx-auto" style="max-width: 500px;">
            <div class="audio-info">
                <i class="fas fa-music text-pink"></i>
                <span class="fw-semibold">Theme Song</span>
            </div>
            <div class="audio-controls">
                <button id="playPauseBtn" class="btn btn-outline-pink btn-sm rounded-circle"><i class="fas fa-play"></i></button>
                <button id="muteBtn" class="btn btn-outline-pink btn-sm rounded-circle"><i class="fas fa-volume-up"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime" class="small">0:00</span>
                <input type="range" id="seekSlider" class="form-range" value="0" step="0.01">
                <span id="duration" class="small">0:00</span>
            </div>
            <audio id="themeAudio" src="assets/audio/theme-song.mp3" preload="auto"></audio>
        </div>
    </div>

    <!-- Gallery Section -->
    <section class="gallery-section py-5">
        <div class="container">
            <h2 class="section-title mb-5px">Our Precious Moments</h2>

            <div class="slideshow-wrapper mx-auto">
                <div class="slideshow-frame">
                    <div class="slide-counter">
                        <span id="currentSlide">1</span> / <span id="totalSlides">0</span>
                    </div>
                    <img id="slideshowImg" src="" alt="Wedding memory" class="slideshow-img">
                    <div class="slide-caption" id="slideCaption"></div>
                </div>

                <div class="slideshow-controls">
                    <button class="slide-btn" id="prevBtn">
                        <i class="fas fa-chevron-left"></i>
                        <span>Prev</span>
                    </button>
                    <div class="slide-dots" id="slideDots"></div>
                    <button class="slide-btn" id="nextBtn">
                        <span>Next</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <div class="thumbnail-strip" id="thumbnailStrip"></div>
            </div>
        </div>
    </section>

    <!-- Proposal Video Section -->
    <section class="video-section py-5">
        <div class="container text-center" style="padding-top: 20px;">
            <h2 class="section-title mb-5px">The Surprise Proposal in Japan</h2>
            <p class="proposal-date mb-5px">OSAKA, JAPAN — APRIL 9, 2025</p>
            <div class="video-frame-wrapper mx-auto mt-5px">
                <div class="video-sakura-frame">
                    <video controls class="proposal-video">
                        <source src="assets/videos/proposal.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center py-4 mt-5">
        <p class="mb-0 small">&copy; 2025 Forever & Always. <i class="fas fa-heart"></i></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
